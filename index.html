<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>

<style>

	img{
		width: 100%;
		border-radius: 10px;
		box-shadow: 0 10px 10px rgba(0, 0, 0, 5.2);
	}

	.producto{
		background: white;
		padding: 20px;
		border-radius: 10px;
		width: 200px;
		box-shadow: 0px 0px 10px rgba(245, 245, 39, 1);
	}


	.precio {
		color:#F86372;
		font-size: 18px;
		margin: 10px 0;
	}

	.container{
		background-color: lightcoral;
		display: flex;
		justify-content: center;
		gap: 20px;
		margin-top: 50px;
	}

	.body {
		font-family: Arial, sans-serif;
		background-color: #f4f4f4;
		text-align: center;
	}


	s {
		color: black;
	}

	h4 {
		color:#F5273C ;
	}

</style>
</head>
<body>


<img src="banner.png">
<br>
<h1> Tienda de Camisetas </h1>
<br>
<br>
<h4>REBAJAS</h4>
<div class="container">

 	<div class="producto">
 		<img src="camiblanca.jpeg" width="100px" alt="Camiseta 1">
 		<h2>Camiseta Blanca</h2>
 		<p>Camiseta blanca 100% algodón, cómoda y ligera</p>
 		<p class="precio"> <s>15€</s> 10,99€</p>

 		<button>Comprar</button>
 	</div>


 	<div class="producto">
 		<img src="caminegra.jpeg" width="100px" alt="Camiseta 1">
 		<h2>Camiseta Negra</h2>
 		<p>Camiseta negra 100% algodón, moderna y elegante</p>
 		<p class="precio"><s>18€</s>15€ </p>
 		<button>Comprar</button>
 	</div>

	<div class="producto">
 		<img src="camiestampada.jpeg" width="100px" alt="Camiseta 1">
 		<h2>Camiseta estampada</h2>
 		<p>Camiseta negra 100% algodón, moderna y juvenil</p>
 		<p class="precio"> <s>12€</s>7,99€ </p>
 		<button>Comprar</button>
 	</div>






</body>
</html>
